<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Unwind Escape Room - Vault</title>
        <link rel="stylesheet" href="./globals.css">
        <link rel="stylesheet" href="./vault.css">
    </head>

    <body>
        <h1><u>Enter code:</u></h1>
        <input type="text" placeholder="Enter code here...">
        <br>
        <button id="submitBtn" onclick="onSubmit()">Submit</button>

        <script>
            // Check if the specific item exists
            var storedCode = localStorage.getItem("vaultCode");

            if (storedCode === null) {
                code = "69420";
            } else {
                code = storedCode;
            }

            const bgColor = "#fff";
            const textInput = document.querySelector("input");
            const body = document.querySelector("body");

            function onSubmit(){
                if (textInput.value === code) {
                    flash("#0f0")
                } else {
                    flash("#f00")
                }
            }

            const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

            async function flash(color, time=300) {
                for (let i=0; i<3; i++) {
                    body.style.backgroundColor = color;
                    await sleep(time);
                    body.style.backgroundColor = bgColor;
                    await sleep(time);
                }
            }
        </script>
    </body>
</html>
